<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baraj Endeksi | VeltusApp</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #1a1d24;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: #2dd4bf20;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        header { display: flex; align-items: center; padding: 15px 20px; background-color: var(--bg-panel); border-bottom: 1px solid var(--border); }
        .hamburger { font-size: 24px; cursor: pointer; margin-right: 15px; user-select: none; }
        .logo { font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .sidebar { height: 100%; width: 250px; position: fixed; z-index: 1000; top: 0; left: -250px; background-color: var(--bg-panel); transition: 0.3s; border-right: 1px solid var(--border); padding-top: 60px; }
        .sidebar.active { left: 0; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; }
        .sidebar a { padding: 15px 20px; text-decoration: none; color: var(--text-muted); display: block; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { color: var(--text-main); background-color: #2dd4bf10; border-left-color: var(--accent); }

        .page { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .controls { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; flex-wrap: wrap; background: var(--bg-panel); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        input { background: var(--bg-dark); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; outline: none; width: 150px; }
        button { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .index-container { background: var(--bg-panel); padding: 25px; border-radius: 16px; text-align: center; margin-bottom: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chart-box { width: 300px; height: 160px; margin: 0 auto; position: relative; }
        .index-score { font-size: 42px; font-weight: 900; margin-top: -40px; }
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 1s, background-color 1s; }
        .index-summary { font-size: 16px; font-weight: bold; padding: 15px; border-radius: 8px; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--bg-panel); padding: 20px; border-radius: 12px; border: 1px solid var(--border); min-height: 140px; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .card-value { font-size: 24px; font-weight: bold; margin: 8px 0; }
        .card-desc { font-size: 12px; color: #cbd5e1; border-top: 1px solid var(--border); padding-top: 10px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }
        /* Dış Bağlantı İkonu Stili */
.source-link {
    position: absolute;
    top: 15px;
    right: 15px;
    color: var(--text-muted);
    font-size: 18px;
    text-decoration: none;
    transition: 0.3s;
    cursor: pointer;
}
.source-link:hover { color: var(--accent); transform: scale(1.2); }
.card { position: relative; } /* İkonun kart içinde konumlanması için */
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
        <a href="#" class="active" onclick="switchPage('kokpit', this)">Makro Baraj Kokpiti</a>
        <a href="#" onclick="switchPage('gayrimenkul', this)">Gayrimenkul Radarı</a>
        <a href="#" onclick="switchPage('hayvancilik', this)">Hayvancılık Finansmanı</a>
        <a href="#" onclick="switchPage('portfoy', this)">Veltus Portföy</a>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
        <div class="logo">Veltus<span>App</span></div>
    </header>

    <div id="kokpit" class="page active">
        <div class="controls">
            <div class="input-group">
                <label>CDS Puanı (Manuel)</label>
                <input type="number" id="cdsInput" value="250">
            </div>
            <button onclick="runRadar()" id="runBtn">Radarı Çalıştır</button>
            <span id="statusText" style="font-size: 11px; color: var(--text-muted); margin-left: 10px;">Sistem Hazır...</span>
        </div>

        <div class="index-container">
            <div class="chart-box">
                <canvas id="gaugeChart"></canvas>
            </div>
            <div class="index-score" id="mainScore">0 / 1000</div>
            <div class="progress-bar">
                <div class="progress-fill" id="scoreBar"></div>
            </div>
            <div class="index-summary" id="mainSummary">Sistem analiz için bekliyor...</div>
        </div>

        <div class="grid" id="cardGrid"></div>
    </div>

    <div id="gayrimenkul" class="page"><h2>Gayrimenkul Radarı</h2></div>
    <div id="hayvancilik" class="page"><h2>Hayvancılık Finansmanı</h2></div>
    <div id="portfoy" class="page"><h2>Veltus Portföy</h2></div>

    <script src="index.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            toggleMenu();
        }
    </script>
</body>
</html>
